name: Docker Build and Push

on:
  push:
#    branches:
#      - 'main'
#      - 'development'
#      - '**dev'
#    tags:
#      - '*'
    paths:
      - '.github/workflows/docker.yml'
      - 'docker/**'
#  release:
#    types: [ published ]

  workflow_dispatch:
    inputs:
#      build_image:
#        description: "Image name for buld."
#        required: true
#        default: "ghcr.io/vados-dev/wg-easy"
#        type: string
#      build_tag:
#        description: "Build tag for the Docker image"
#        required: true
#        default: "rb14lts"
#        type: string
      build_platforms:
        description: "Build platforms e.g.
          (linux/amd64,linux/arm64,linux/arm/v7)"
        required: true
        default: "linux/amd64"
        type: string

env:
  DOCKERHUB_PREFIX: docker.io
  GITHUB_CONTAINER_PREFIX: ghcr.io
  DOCKER_IMAGE: WGDashboard
  DEFAULT_PLATFORMS: linux/amd64

jobs:
  docker_build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to registries
        uses: docker/login-action@v4
        with:
          registry-auth: |
            - username: ${{ secrets.DOCKER_HUB_USERNAME }}
              password: ${{ secrets.DOCKER_HUB_PASSWORD }}
            - registry: ${{ env.GITHUB_CONTAINER_PREFIX }}
              username: ${{ github.actor }}
              password: ${{ secrets.GITHUB_TOKEN }}

#      - name: Log in to Docker Hub
#        uses: docker/login-action@v3
#        with:
#          registry: ${{ env.DOCKERHUB_PREFIX }}
#          username: ${{ secrets.DOCKER_HUB_USERNAME }}
#          password: ${{ secrets.DOCKER_HUB_PASSWORD }}
#
#      - name: Log in to GitHub Container Registry
#        uses: docker/login-action@v3
#        with:
#          registry: ${{ env.GITHUB_CONTAINER_PREFIX }}
#          username: ${{ github.actor }}
#          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64,linux/arm/v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata from environment
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.GITHUB_CONTAINER_PREFIX }}/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short,prefix=
            type=semver,pattern={{version}}
          flavor: |
            latest=true
          labels: |
            maintainer=${{ github.repository_owner }}
            org.opencontainers.image.created={{commit_date 'YYYY-MM-DDTHH:mm:ss.SSS[Z]'}}
            org.opencontainers.image.revision={{commit_short}}
            org.opencontainers.image.version={{version}}
            org.opencontainers.image.url={{url}}
            org.opencontainers.image.source={{url}}
            org.opencontainers.image.documentation={{url}}

      - name: Build and export Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: ${{ github.event.inputs.build_platforms || env.DEFAULT_PLATFORMS }}

  docker_scan:
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    needs: docker_build
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKERHUB_PREFIX }}
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PASSWORD }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GITHUB_CONTAINER_PREFIX }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Scout CVEs
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ env.GITHUB_CONTAINER_PREFIX }}/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE }}:main
          only-severities: critical,high
          only-fixed: true
          write-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Scout Compare
        uses: docker/scout-action@v1
        with:
          command: compare
          # Set to Github for maximum compat
          image: ${{ env.GITHUB_CONTAINER_PREFIX }}/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE }}:main
          to: ${{ env.GITHUB_CONTAINER_PREFIX }}/${{ github.repository_owner }}/${{ env.DOCKER_IMAGE }}:latest
          only-severities: critical,high
          ignore-unchanged: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
